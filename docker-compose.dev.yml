services:
  db:
    image: mysql:8.0
    container_name: parking-mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=${DB_NAME}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --skip-character-set-client-handshake
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    networks:
      - parking-net

  redis:
    image: redis:7-alpine
    container_name: parking-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    networks:
      - parking-net 

  qdrant:
    image: qdrant/qdrant:latest
    container_name: parking-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data_dev:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - parking-net

  api:
    build:
      context: .
      dockerfile: DockerFile
    container_name: parking-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - parking-net

  celery_worker:
    build:
      context: .
      dockerfile: DockerFile
    container_name: parking-celery-worker
    restart: unless-stopped
    command: celery -A app.core.celery_app.celery worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
      - .env.docker
    networks:
      - parking-net

volumes:
  mysql_data_dev:
  redis_data_dev:
  qdrant_data_dev:

networks:
  parking-net:
    driver: bridge
